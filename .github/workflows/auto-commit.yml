name: Auto Commit Manifest

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to update.
        required: true
        default: main
      commit_message:
        description: Commit message for the manifest update.
        required: true
        default: "chore: update build manifest [skip ci]"
      manifest_note:
        description: Note to include in docs/build-manifest.json.
        required: false
        default: "Automated CI/CD manifest update."

permissions:
  contents: write

concurrency:
  group: auto-commit-manifest-${{ github.event.inputs.target_branch }}
  cancel-in-progress: false

jobs:
  validate-and-commit:
    name: Validate, Commit, and Push
    runs-on: windows-latest

    steps:
      - name: Check out selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            api/requirements.txt
            api/requirements-dev.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r api/requirements.txt
          python -m pip install -r api/requirements-dev.txt

      - name: Validate project
        shell: pwsh
        env:
          HUD_DATABASE_PATH: ${{ runner.temp }}\auto_commit_market_history.db
        run: |
          python -m compileall api
          python -m pytest -q

      - name: Generate build manifest
        shell: pwsh
        env:
          MANIFEST_NOTE: ${{ github.event.inputs.manifest_note }}
        run: |
          python scripts\generate_build_manifest.py `
            --output docs\build-manifest.json `
            --note "$env:MANIFEST_NOTE"

      - name: Commit and push manifest
        shell: pwsh
        env:
          COMMIT_MESSAGE: ${{ github.event.inputs.commit_message }}
          TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/build-manifest.json

          if ((git diff --cached --name-only).Length -eq 0) {
            Write-Host "No manifest changes to commit."
            exit 0
          }

          git commit -m "$env:COMMIT_MESSAGE"
          git push origin "HEAD:$env:TARGET_BRANCH"
