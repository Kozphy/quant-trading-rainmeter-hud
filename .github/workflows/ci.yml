name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate on Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            api/requirements.txt
            api/requirements-dev.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r api/requirements.txt
          python -m pip install -r api/requirements-dev.txt

      - name: Compile backend modules
        shell: pwsh
        run: python -m compileall api

      - name: Run contract tests
        shell: pwsh
        env:
          HUD_DATABASE_PATH: ${{ runner.temp }}\ci_market_history.db
        run: python -m pytest -q

  package:
    name: Package artifact
    runs-on: windows-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create distribution archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive `
            -Path api,rainmeter,docs,README.md,AGENTS.md,LICENSE,.gitignore `
            -DestinationPath dist\quant-trading-rainmeter-hud.zip `
            -Force

      - name: Upload project artifact
        uses: actions/upload-artifact@v4
        with:
          name: quant-trading-rainmeter-hud
          path: dist/quant-trading-rainmeter-hud.zip
