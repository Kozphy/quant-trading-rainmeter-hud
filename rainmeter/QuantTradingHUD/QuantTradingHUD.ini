[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=18,20,24,215

[Metadata]
Name=Quant Trading HUD
Author=quant-trading-rainmeter-hud
Information=Rainmeter desktop HUD for local FastAPI quant monitoring.
Version=3.0.0
License=MIT

[Variables]
ApiDataUrl=http://127.0.0.1:8000/data
ApiCalendarUrl=http://127.0.0.1:8000/calendar
FontName=Segoe UI
ColorPanel=18,20,24,215
ColorBorder=80,85,95,160
ColorText=245,247,250,255
ColorMuted=148,163,184,255
ColorGreen=46,204,113,255
ColorRed=239,68,68,255
ColorAmber=245,158,11,255

; -----------------------------
; Data measures
; -----------------------------

[MeasureData]
Measure=WebParser
URL=#ApiDataUrl#
UpdateRate=10
RegExp=(?siU)"btc_price"\s*:\s*([-0-9.]+).*"btc_change_24h"\s*:\s*([-0-9.]+).*"eth_price"\s*:\s*([-0-9.]+).*"eth_change_24h"\s*:\s*([-0-9.]+).*"action"\s*:\s*"([^"]+)".*"confidence"\s*:\s*([-0-9.]+).*"regime"\s*:\s*"([^"]+)".*"data_staleness_seconds"\s*:\s*([0-9]+).*"bot_status"\s*:\s*"([^"]+)".*"data_status"\s*:\s*"([^"]+)".*"latency_ms"\s*:\s*([0-9]+).*"updated_at"\s*:\s*"([^"]+)"
ErrorString=ERROR
FinishAction=[!UpdateMeasureGroup DataValues][!UpdateMeterGroup DataMeters][!Redraw]
DynamicVariables=1

[MeasureBTCPrice]
Measure=WebParser
URL=[MeasureData]
StringIndex=1
Group=DataValues
ErrorString=0.00

[MeasureBTCChange]
Measure=WebParser
URL=[MeasureData]
StringIndex=2
Group=DataValues
ErrorString=0.00

[MeasureETHPrice]
Measure=WebParser
URL=[MeasureData]
StringIndex=3
Group=DataValues
ErrorString=0.00

[MeasureETHChange]
Measure=WebParser
URL=[MeasureData]
StringIndex=4
Group=DataValues
ErrorString=0.00

[MeasureSignal]
Measure=WebParser
URL=[MeasureData]
StringIndex=5
Group=DataValues
ErrorString=WAIT
IfMatch=LONG
IfMatchAction=[!SetOption MeterSignalValue FontColor "#ColorGreen#"]
IfMatch2=SHORT
IfMatchAction2=[!SetOption MeterSignalValue FontColor "#ColorRed#"]
IfMatch3=WAIT
IfMatchAction3=[!SetOption MeterSignalValue FontColor "#ColorAmber#"]
IfMatchMode=1

[MeasureConfidence]
Measure=WebParser
URL=[MeasureData]
StringIndex=6
Group=DataValues
ErrorString=0.00

[MeasureRegime]
Measure=WebParser
URL=[MeasureData]
StringIndex=7
Group=DataValues
ErrorString=Sideways

[MeasureDataAge]
Measure=WebParser
URL=[MeasureData]
StringIndex=8
Group=DataValues
ErrorString=0

[MeasureBotStatus]
Measure=WebParser
URL=[MeasureData]
StringIndex=9
Group=DataValues
ErrorString=ERROR
IfMatch=RUNNING
IfMatchAction=[!SetOption MeterBotStatusValue FontColor "#ColorGreen#"]
IfMatch2=WARNING
IfMatchAction2=[!SetOption MeterBotStatusValue FontColor "#ColorAmber#"]
IfMatch3=ERROR
IfMatchAction3=[!SetOption MeterBotStatusValue FontColor "#ColorRed#"]
IfMatchMode=1

[MeasureUpdatedAt]
Measure=WebParser
URL=[MeasureData]
StringIndex=12
Group=DataValues
ErrorString=N/A

[MeasureDataStatus]
Measure=WebParser
URL=[MeasureData]
StringIndex=10
Group=DataValues
ErrorString=ERROR
IfMatch=LIVE
IfMatchAction=[!SetOption MeterDataStatusValue FontColor "#ColorGreen#"]
IfMatch2=STALE
IfMatchAction2=[!SetOption MeterDataStatusValue FontColor "#ColorAmber#"]
IfMatch3=ERROR
IfMatchAction3=[!SetOption MeterDataStatusValue FontColor "#ColorRed#"]
IfMatchMode=1

[MeasureLatency]
Measure=WebParser
URL=[MeasureData]
StringIndex=11
Group=DataValues
ErrorString=0

; -----------------------------
; Calendar measures
; -----------------------------

[MeasureCalendar]
Measure=WebParser
URL=#ApiCalendarUrl#
UpdateRate=300
RegExp=(?siU)"tasks"\s*:\s*\[.*"time"\s*:\s*"([^"]+)".*"name"\s*:\s*"([^"]+)".*"time"\s*:\s*"([^"]+)".*"name"\s*:\s*"([^"]+)".*"time"\s*:\s*"([^"]+)".*"name"\s*:\s*"([^"]+)".*"time"\s*:\s*"([^"]+)".*"name"\s*:\s*"([^"]+)"
ErrorString=ERROR
FinishAction=[!UpdateMeasureGroup CalendarValues][!UpdateMeterGroup CalendarMeters][!Redraw]
DynamicVariables=1

[MeasureTaskTime1]
Measure=WebParser
URL=[MeasureCalendar]
StringIndex=1
Group=CalendarValues
ErrorString=09:00

[MeasureTaskName1]
Measure=WebParser
URL=[MeasureCalendar]
StringIndex=2
Group=CalendarValues
ErrorString=Risk Review

[MeasureTaskTime2]
Measure=WebParser
URL=[MeasureCalendar]
StringIndex=3
Group=CalendarValues
ErrorString=14:30

[MeasureTaskName2]
Measure=WebParser
URL=[MeasureCalendar]
StringIndex=4
Group=CalendarValues
ErrorString=Backtest Batch

[MeasureTaskTime3]
Measure=WebParser
URL=[MeasureCalendar]
StringIndex=5
Group=CalendarValues
ErrorString=20:30

[MeasureTaskName3]
Measure=WebParser
URL=[MeasureCalendar]
StringIndex=6
Group=CalendarValues
ErrorString=US Macro Watch

[MeasureTaskTime4]
Measure=WebParser
URL=[MeasureCalendar]
StringIndex=7
Group=CalendarValues
ErrorString=23:00

[MeasureTaskName4]
Measure=WebParser
URL=[MeasureCalendar]
StringIndex=8
Group=CalendarValues
ErrorString=Execution Log Audit

; -----------------------------
; Meter styles
; -----------------------------

[StyleTitle]
FontFace=#FontName#
FontSize=17
FontWeight=600
FontColor=#ColorText#
AntiAlias=1
StringAlign=Left

[StyleSection]
FontFace=#FontName#
FontSize=10
FontWeight=600
FontColor=#ColorText#
AntiAlias=1
StringAlign=Left

[StyleLabel]
FontFace=#FontName#
FontSize=9
FontColor=#ColorMuted#
AntiAlias=1
StringAlign=Left

[StyleValue]
FontFace=#FontName#
FontSize=10
FontWeight=500
FontColor=#ColorText#
AntiAlias=1
StringAlign=Right
Group=DataMeters

[StyleCalendar]
FontFace=#FontName#
FontSize=9
FontColor=#ColorText#
AntiAlias=1
StringAlign=Left
Group=CalendarMeters

